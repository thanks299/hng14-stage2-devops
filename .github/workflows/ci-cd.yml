name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: localhost:5000

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python linters
        run: pip install flake8 pylint
      
      - name: Lint API
        run: flake8 api/ --max-line-length=120 --ignore=E203,W503,E402,E302,E305,W293
      
      - name: Lint Worker
        run: flake8 worker/ --max-line-length=120 --ignore=E203,W503,E302,E305,W293
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install JS linter
        run: |
          cd frontend
          npm install -g eslint
          npm install
      
      - name: Lint Frontend
        run: |
          cd frontend
          eslint . --ext .js --max-warnings=0 || true
      
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: warning
      
      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: warning
      
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run API tests
        run: |
          cd api
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
          retention-days: 7
      
      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: api/htmlcov/
          retention-days: 7

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image
        run: docker build -t api:${{ github.sha }} ./api
      
      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} ./worker
      
      - name: Build Frontend image
        run: docker build -t frontend:${{ github.sha }} ./frontend
      
      - name: Tag images as latest
        run: |
          docker tag api:${{ github.sha }} api:latest
          docker tag worker:${{ github.sha }} worker:latest
          docker tag frontend:${{ github.sha }} frontend:latest
      
      - name: Scan API with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      
      - name: Scan Worker with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      
      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
      
      - name: Check for critical vulnerabilities
        run: |
          if grep -q '"severity":"CRITICAL"' trivy-*.sarif 2>/dev/null; then
            echo "CRITICAL vulnerabilities found!"
            exit 1
          fi
          echo "No CRITICAL vulnerabilities found"
      
      - name: Save images for integration tests
        run: |
          docker save api:${{ github.sha }} -o api-image.tar
          docker save worker:${{ github.sha }} -o worker-image.tar
          docker save frontend:${{ github.sha }} -o frontend-image.tar
      
      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api-image.tar
            worker-image.tar
            frontend-image.tar
          retention-days: 1

  integration-test:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
      
      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar
          docker tag api:${{ github.sha }} api:latest
          docker tag worker:${{ github.sha }} worker:latest
          docker tag frontend:${{ github.sha }} frontend:latest
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          LOG_LEVEL=INFO
          EOF
      
      - name: Start services
        run: docker compose -f docker-compose.yml up -d
      
      - name: Wait for services
        run: |
          echo "Waiting for services..."
          sleep 30
          for i in {1..30}; do
            if curl -f http://localhost:3000/health; then
              echo "Services ready"
              exit 0
            fi
            sleep 5
          done
          exit 1
      
      - name: Test job submission
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            exit 1
          fi
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      
      - name: Debug
        if: failure()
        run: docker compose logs
      
      - name: Cleanup
        if: always()
        run: docker compose down -v

  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
      
      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar
          docker tag api:${{ github.sha }} api:latest
          docker tag worker:${{ github.sha }} worker:latest
          docker tag frontend:${{ github.sha }} frontend:latest
      
      - name: Deploy
        run: |
          docker compose down
          docker compose up -d
          sleep 30
          for service in api worker frontend; do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' job-queue-$service)
            if [ "$HEALTH" != "healthy" ]; then
              docker compose down
              exit 1
            fi
          done
          echo "Deployment successful"
