name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: localhost:5000
  SHA_TAG: ${{ github.sha }}

jobs:
  # Job 1: Lint all code
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Python linters
        run: |
          pip install flake8 pylint
      
      - name: Lint API code
        run: |
          flake8 api/ --max-line-length=120 --ignore=E203,W503,E402
      
      - name: Lint Worker code
        run: |
          flake8 worker/ --max-line-length=120 --ignore=E203,W503
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install JavaScript linter
        run: |
          cd frontend
          npm install -g eslint
          npm install
      
      - name: Lint Frontend code
        run: |
          cd frontend
          eslint . --ext .js --max-warnings=0 || true
      
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: |
            api/Dockerfile
            worker/Dockerfile
            frontend/Dockerfile
          failure-threshold: warning

  # Job 2: Run unit tests
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          # Install the api package in development mode
          pip install -e ..
      
      - name: Run API tests with coverage
        run: |
          cd api
          PYTHONPATH=. pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: api/coverage.xml
      
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-html
          path: api/htmlcov/

  # Job 3: Build Docker images
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Start local Docker registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
      
      - name: Build API image
        run: |
          docker build -t ${{ env.REGISTRY }}/api:${{ env.SHA_TAG }} ./api
          docker tag ${{ env.REGISTRY }}/api:${{ env.SHA_TAG }} ${{ env.REGISTRY }}/api:latest
      
      - name: Build Worker image
        run: |
          docker build -t ${{ env.REGISTRY }}/worker:${{ env.SHA_TAG }} ./worker
          docker tag ${{ env.REGISTRY }}/worker:${{ env.SHA_TAG }} ${{ env.REGISTRY }}/worker:latest
      
      - name: Build Frontend image
        run: |
          docker build -t ${{ env.REGISTRY }}/frontend:${{ env.SHA_TAG }} ./frontend
          docker tag ${{ env.REGISTRY }}/frontend:${{ env.SHA_TAG }} ${{ env.REGISTRY }}/frontend:latest
      
      - name: Push images to local registry
        run: |
          docker push ${{ env.REGISTRY }}/api:${{ env.SHA_TAG }}
          docker push ${{ env.REGISTRY }}/api:latest
          docker push ${{ env.REGISTRY }}/worker:${{ env.SHA_TAG }}
          docker push ${{ env.REGISTRY }}/worker:latest
          docker push ${{ env.REGISTRY }}/frontend:${{ env.SHA_TAG }}
          docker push ${{ env.REGISTRY }}/frontend:latest
      
      - name: List images
        run: |
          docker images
          curl -X GET http://localhost:5000/v2/_catalog

  # Job 4: Security scan with Trivy
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run Trivy vulnerability scanner (API)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/api:${{ env.SHA_TAG }}
          format: 'sarif'
          output: 'trivy-results-api.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Run Trivy vulnerability scanner (Worker)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/worker:${{ env.SHA_TAG }}
          format: 'sarif'
          output: 'trivy-results-worker.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/frontend:${{ env.SHA_TAG }}
          format: 'sarif'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results-api.sarif'
      
      - name: Upload Trivy results (Worker)
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results-worker.sarif'
      
      - name: Upload Trivy results (Frontend)
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results-frontend.sarif'
      
      - name: Check for CRITICAL vulnerabilities
        run: |
          if grep -q '"severity":"CRITICAL"' trivy-results-*.sarif; then
            echo "CRITICAL vulnerabilities found!"
            exit 1
          fi
          echo "No CRITICAL vulnerabilities found"

  # Job 5: Integration tests
  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          LOG_LEVEL=INFO
          EOF
      
      - name: Start services with docker-compose
        run: |
          docker compose -f docker-compose.yml up -d
      
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be ready..."
          sleep 30
          for i in {1..30}; do
            if curl -f http://localhost:3000/health; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... (attempt $i/30)"
            sleep 5
          done
      
      - name: Run integration tests
        run: |
          # Install jq for JSON parsing
          sudo apt-get update && sudo apt-get install -y jq
          
          # Submit a job
          echo "Submitting test job..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo $RESPONSE
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "Failed to get job ID"
            exit 1
          fi
          
          echo "Job ID: $JOB_ID"
          
          # Poll for job completion
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            echo "Attempt $i/30 - Job status: $STATUS"
            
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Job completed successfully!"
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              echo "❌ Job failed!"
              exit 1
            fi
            sleep 2
          done
          
          echo "❌ Job did not complete within timeout"
          exit 1
      
      - name: Debug logs if test fails
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose logs
          echo "=== Redis Data ==="
          docker exec job-queue-redis redis-cli LRANGE job 0 -1
      
      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v

  # Job 6: Deploy (only on main branch)
  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy with rolling update
        run: |
          echo "Starting rolling update deployment..."
          
          # Pull latest images
          docker pull ${{ env.REGISTRY }}/api:latest
          docker pull ${{ env.REGISTRY }}/worker:latest
          docker pull ${{ env.REGISTRY }}/frontend:latest
          
          # Stop and remove old containers
          docker compose down
          
          # Start new containers
          docker compose up -d
          
          # Wait for health checks
          echo "Waiting for health checks..."
          sleep 30
          
          # Verify all services are healthy
          for service in api worker frontend; do
            CONTAINER_NAME="job-queue-$service"
            for i in {1..12}; do
              HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER_NAME 2>/dev/null)
              echo "Service $service health status: $HEALTH_STATUS"
              
              if [ "$HEALTH_STATUS" = "healthy" ]; then
                echo "✅ $service is healthy"
                break
              elif [ "$HEALTH_STATUS" = "unhealthy" ]; then
                echo "❌ $service is unhealthy! Rolling back..."
                docker compose down
                exit 1
              fi
              
              if [ $i -eq 12 ]; then
                echo "❌ $service health check timeout after 60 seconds"
                docker compose down
                exit 1
              fi
              sleep 5
            done
          done
          
          echo "✅ Deployment successful! All services are healthy."
      
      - name: Verify deployment
        run: |
          curl -f http://localhost:3000/health || exit 1
          echo "Deployment verified successfully"
