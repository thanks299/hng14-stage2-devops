name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: localhost:5000

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python linters
        run: pip install flake8 pylint
      
      - name: Lint API
        run: flake8 api/ --max-line-length=120 --ignore=E203,W503,E402,E302,E305,W293
      
      - name: Lint Worker
        run: flake8 worker/ --max-line-length=120 --ignore=E203,W503,E302,E305,W293
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install JS linter
        run: |
          cd frontend
          npm install -g eslint
          npm install
      
      - name: Lint Frontend
        run: |
          cd frontend
          eslint . --ext .js --max-warnings=0 || true
      
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: api/Dockerfile
          failure-threshold: warning
      
      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: worker/Dockerfile
          failure-threshold: warning
      
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run API tests
        run: |
          cd api
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
          retention-days: 7
      
      - name: Upload HTML coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: api/htmlcov/
          retention-days: 7

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Start Docker registry
        run: docker run -d -p 5000:5000 --name registry registry:2
      
      - name: Build API image
        run: docker build -t localhost:5000/api:${{ github.sha }} ./api
      
      - name: Build Worker image
        run: docker build -t localhost:5000/worker:${{ github.sha }} ./worker
      
      - name: Build Frontend image
        run: docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend
      
      - name: Tag images as latest
        run: |
          docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest
          docker tag localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest
          docker tag localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest
      
      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
      
      - name: Scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH
      
      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
      
      - name: Check for critical vulnerabilities
        run: |
          if grep -q '"severity":"CRITICAL"' trivy-*.sarif 2>/dev/null; then
            echo "CRITICAL vulnerabilities found"
            exit 1
          fi
          echo "No CRITICAL vulnerabilities found"

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          LOG_LEVEL=INFO
          EOF
      
      - name: Start services
        run: docker compose -f docker-compose.yml up -d
      
      - name: Wait for services
        run: |
          echo "Waiting for services to be ready..."
          sleep 30
          for i in {1..30}; do
            if curl -f http://localhost:3000/health; then
              echo "Services are ready"
              exit 0
            fi
            echo "Attempt $i/30 - Waiting for frontend..."
            sleep 5
          done
          echo "Services failed to start"
          exit 1
      
      - name: Test job submission
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          
          echo "Submitting test job..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "Failed to create job"
            exit 1
          fi
          
          echo "Job ID: $JOB_ID"
          
          for i in {1..30}; do
            STATUS_RESPONSE=$(curl -s http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $STATUS_RESPONSE | jq -r '.status')
            echo "Attempt $i/30 - Status: $STATUS"
            
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              echo "Job failed!"
              exit 1
            fi
            sleep 2
          done
          
          echo "Job did not complete within timeout"
          exit 1
      
      - name: Debug logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose logs
          echo "=== Redis Queue Contents ==="
          docker exec job-queue-redis redis-cli LRANGE job 0 -1 || echo "Redis not accessible"
      
      - name: Cleanup
        if: always()
        run: docker compose down -v

  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy with rolling update
        run: |
          echo "Starting deployment..."
          
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest
          
          docker compose down
          docker compose up -d
          
          echo "Waiting for health checks..."
          sleep 30
          
          for service in api worker frontend; do
            CONTAINER_NAME="job-queue-$service"
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER_NAME 2>/dev/null)
            echo "Service $service health: $HEALTH"
            
            if [ "$HEALTH" != "healthy" ]; then
              echo "Service $service is not healthy! Rolling back..."
              docker compose down
              exit 1
            fi
          done
          
          echo "Deployment successful! All services are healthy."
          
      - name: Verify deployment
        run: |
          curl -f http://localhost:3000/health || exit 1
          echo "Deployment verified"
