version: '3.8'
 
networks:
  internal:
    driver: bridge
 
services:
  redis:
    image: redis:7-alpine
    container_name: job-queue-redis
    restart: unless-stopped
    networks:
      - internal
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
 
  api:
    build: ./api
    container_name: job-queue-api
    restart: unless-stopped
    networks:
      - internal
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      # FIX: Use urllib (stdlib) instead of 'requests' which is NOT installed in the image.
      # The Dockerfile HEALTHCHECK already uses urllib correctly — match it here.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      # FIX: Reduced from 40s — 40s start_period + 30s interval meant Docker
      # wouldn't confirm healthy until ~70s, causing the runner to time out.
      start_period: 20s
 
  worker:
    build: ./worker
    container_name: job-queue-worker
    restart: unless-stopped
    networks:
      - internal
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WORKER_POLL_INTERVAL=5
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8080
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      # FIX: Use redis-based liveness check instead of socket.connect().
      # socket.connect to port 8080 only works if your worker actually opens that port.
      # Checking Redis connectivity proves the worker can do its actual job.
      test: ["CMD", "python", "-c", "import redis, os; r=redis.Redis(host=os.getenv('REDIS_HOST','redis'), port=int(os.getenv('REDIS_PORT',6379))); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
 
  frontend:
    build: ./frontend
    container_name: job-queue-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - internal
    environment:
      - FRONTEND_PORT=3000
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
 
volumes:
  redis-data:
    driver: local