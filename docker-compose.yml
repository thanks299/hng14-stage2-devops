# version: '3.8' - Remove this line to avoid warning

networks:
  internal:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: job-queue-redis
    restart: unless-stopped
    networks:
      - internal
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api:
    build: ./api
    container_name: job-queue-api
    restart: unless-stopped
    networks:
      - internal
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  worker:
    build: ./worker
    container_name: job-queue-worker
    restart: unless-stopped
    networks:
      - internal
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WORKER_POLL_INTERVAL=5
      - LOG_LEVEL=INFO
      - HEALTH_PORT=8080
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r=redis.Redis(host=os.getenv('REDIS_HOST','redis'), port=int(os.getenv('REDIS_PORT',6379))); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build: ./frontend
    container_name: job-queue-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - internal
    environment:
      - FRONTEND_PORT=3000
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  redis-data:
    driver: local
